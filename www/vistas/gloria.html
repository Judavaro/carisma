
<ion-pane ng-controller="gloria" >
   <div class="bar bar-clear">
    <button ui-sref="ppal" class="button button-clear button-header" on-tap="pararaudio()">
      <i class="icon ion-android-arrow-back icon-clear icon-positive" ></i></button>
    <div class="h1 title"></div>
    <button class="button button-clear button-header" 
    on-tap="CompartirRedesSociales()">
      <i class="icon ion-android-share-alt icon-clear icon-positive"></i></button>
  </div>
  <ion-content >
    
    
     <div class="item item-image">
      <img ng-src="img/gloria.jpg" class="full-image">
    </div>
     <div class="item tabs tabs-secondary tabs-icon-left" >
         <a class="tab-item" on-tap="AumentarPopularidad()">
        <i ng-class="popularidad" style="font-size:20px;"> {{cantidadPopularidad}}</i>
      </a>
      <a class="tab-item" on-tap="empezar()">
        <i  class="icon ion-play" > </i>
      </a>
      <a class="tab-item" on-tap="pausar()">
        <i class="icon ion-pause" > </i>
      </a>  
    </div>
      <div class="text-left oracion"><br>Gloria al Padre,
y al Hijo,
y al Espíritu Santo. <br>
Como era en el principio,
ahora y siempre,
por los siglos de los siglos. </br></br>Amén. 
</div>
    
    <br>
    </ion-content>
  </ion-pane>
